<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component Specifications | GPU Trades</title>
  
  <meta name="description" content="View comprehensive hardware specifications, reviews, and pricing details at GPU Trades.">
  <meta name="keywords" content="GPU, product details, component specs, graphics card specs, PC components">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet" id="bootstrap-css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  
  <link href="assets/css/style.css" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/supabase-sync.js"></script>
  <script src="assets/js/products-data.js"></script>
  <script src="assets/js/cart-wishlist.js"></script>
  <script src="assets/js/auth-guard.js"></script>
  <script src="assets/js/whatsapp-invite.js"></script>
</head>
<body>

  <!-- Preloader -->
  <div id="loading-screen">
    <div class="loader-circuit-container">
      <div class="loader-ring"></div>
      <div class="loader-cpu-chip"></div>
    </div>
    <div class="font-monospace text-orange fs-7 mt-3 animate-pulse" data-translate="details-boot">جاري تحميل نظام التشغيل...</div>
  </div>

  <!-- Header -->
  <script src="assets/js/main.js"></script>
  <script>renderPremiumHeader();</script>

  <!-- Main Container -->
  <section class="py-5 mt-4">
    <div class="container" id="product-detail-layout">
      <!-- Injected via JavaScript dynamically -->
    </div>
  </section>

  <!-- Reviews & Specifications tabs -->
  <section class="py-5 bg-glass border-top border-bottom border-orange position-relative">
    <div class="circuit-overlay"></div>
    <div class="container position-relative z-1">
      <div class="row g-5">
        
        <!-- Specifications Table -->
        <div class="col-lg-7">
          <h4 class="text-white font-monospace mb-4 border-bottom border-orange pb-2 text-uppercase" id="specs-heading"></h4>
          <div class="glass-panel p-4">
            <table class="table table-borderless text-white mb-0">
              <tbody id="detailed-specs-tbody">
                <!-- Injected via JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Rating Breakdown & Reviews -->
        <div class="col-lg-5">
          <h4 class="text-white font-monospace mb-4 border-bottom border-orange pb-2 text-uppercase" id="reviews-heading"></h4>
          <div class="glass-panel p-4 mb-4">
            <div class="d-flex align-items-center gap-4 mb-4">
              <div class="text-center">
                <h1 class="display-3 text-white mb-0 font-monospace text-orange" id="breakdown-rating-val">0.0</h1>
                <div class="product-rating fs-8 mt-1" id="breakdown-stars"></div>
                <small class="text-muted font-monospace" id="breakdown-reviews-count">0 reviews</small>
              </div>
              <div class="flex-grow-1 font-monospace fs-8 text-muted">
                <!-- Stars progress bar -->
                <div class="d-flex align-items-center gap-2 mb-2">
                  <span>5<i class="bi bi-star-fill text-warning ms-1"></i></span>
                  <div class="progress bg-glass flex-grow-1" style="height: 6px;"><div class="progress-bar bg-warning" style="width: 90%"></div></div>
                  <span>90%</span>
                </div>
                <div class="d-flex align-items-center gap-2 mb-2">
                  <span>4<i class="bi bi-star-fill text-warning ms-1"></i></span>
                  <div class="progress bg-glass flex-grow-1" style="height: 6px;"><div class="progress-bar bg-warning" style="width: 8%"></div></div>
                  <span>8%</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                  <span>3<i class="bi bi-star-fill text-warning ms-1"></i></span>
                  <div class="progress bg-glass flex-grow-1" style="height: 6px;"><div class="progress-bar bg-warning" style="width: 2%"></div></div>
                  <span>2%</span>
                </div>
              </div>
            </div>
          </div>
          
          <div class="d-flex flex-column gap-3" id="product-reviews-list">
            <!-- Injected via JS -->
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- Related Products -->
  <section class="py-5">
    <div class="container">
      <h4 class="text-white font-monospace mb-4 border-bottom border-orange pb-2 text-uppercase" id="related-heading"></h4>
      
      <div class="swiper related-swiper">
        <div class="swiper-wrapper" id="related-products-swiper-wrapper">
          <!-- Injected via JS -->
        </div>
        <div class="swiper-button-next d-none d-md-flex"></div>
        <div class="swiper-button-prev d-none d-md-flex"></div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <script>renderPremiumFooter();</script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <!-- Dynamic Product Loading Script -->
  <script>
    function initProductDetailsPage() {
      // 1. Extract URL parameter ?id=...
      const urlParams = new URLSearchParams(window.location.search);
      let productId = urlParams.get('id');

      let product = PRODUCTS_DATA.find(p => String(p.id) === String(productId));
      if (!product) {
        const currentLang = getCurrentLang();
        document.title = currentLang === 'ar' ? 'المنتج غير متاح | GPU Trades' : 'Product unavailable | GPU Trades';
        const layoutContainer = document.getElementById('product-detail-layout');
        if (layoutContainer) {
          layoutContainer.innerHTML = `
            <div class="glass-panel p-5 text-center my-5">
              <i class="bi bi-box-seam text-orange display-2 d-block mb-3"></i>
              <h2 class="text-white font-monospace">${currentLang === 'ar' ? 'لا يوجد منتج لعرضه' : 'No product to display'}</h2>
              <p class="text-muted font-monospace fs-7 mb-4">${currentLang === 'ar' ? 'سيتم عرض تفاصيل المنتجات بعد إضافتها من لوحة الإدارة أو ربط الباك إند.' : 'Product details will appear after products are added from the admin panel or backend.'}</p>
              <a href="products.html" class="btn btn-gradient font-monospace">${currentLang === 'ar' ? 'العودة إلى الكتالوج' : 'Back to catalog'}</a>
            </div>
          `;
        }
        document.getElementById('specs-heading').innerHTML = currentLang === 'ar' ? 'المواصفات الفنية' : 'Specifications';
        document.getElementById('reviews-heading').innerHTML = currentLang === 'ar' ? 'التقييمات' : 'Reviews';
        document.getElementById('related-heading').innerHTML = currentLang === 'ar' ? 'منتجات ذات صلة' : 'Related products';
        document.getElementById('detailed-specs-tbody').innerHTML = `<tr><td colspan="2" class="text-center py-4 text-muted">${currentLang === 'ar' ? 'لا توجد مواصفات بعد' : 'No specifications yet'}</td></tr>`;
        document.getElementById('breakdown-rating-val').textContent = '0.0';
        document.getElementById('breakdown-stars').innerHTML = '';
        document.getElementById('breakdown-reviews-count').textContent = currentLang === 'ar' ? '0 تقييم' : '0 reviews';
        document.getElementById('product-reviews-list').innerHTML = `<div class="glass-panel p-4 text-center text-muted font-monospace">${currentLang === 'ar' ? 'لا توجد تقييمات بعد' : 'No reviews yet'}</div>`;
        const relatedSwiper = document.querySelector('.related-swiper');
        if (relatedSwiper) {
          relatedSwiper.innerHTML = `<div class="text-center text-muted font-monospace py-4 fs-7">${currentLang === 'ar' ? 'لا توجد منتجات ذات صلة بعد' : 'No related products yet'}</div>`;
        }
        // Product might just not have synced from Supabase yet (e.g. a direct
        // link opened before the initial pull() finished) — retry once when
        // the sync completes instead of permanently showing "unavailable".
        if (!initProductDetailsPage._retried) {
          initProductDetailsPage._retried = true;
          window.addEventListener('gpu:synced', () => initProductDetailsPage(), { once: true });
        }
        return;
      }

      function renderDetails() {
        const currentLang = getCurrentLang();

        const name = currentLang === 'ar' ? product.name_ar : product.name_en;
        const desc = currentLang === 'ar' ? product.description_ar : product.description_en;
        const category = currentLang === 'ar' ? product.category_ar : product.category_en;
        const availability = currentLang === 'ar' 
          ? (product.stock > 0 ? `متوفر في المخزن (متبقي ${product.stock} قطع)` : 'نفذت الكمية')
          : (product.stock > 0 ? `In Stock (${product.stock} left)` : 'Out of Stock');
        const warranty = currentLang === 'ar' ? product.warranty_ar : product.warranty_en;
        
        // Update document SEO head programmatically
        document.title = `${name} | Specs & Reviews | GPU Trades`;
        document.querySelector('meta[name="description"]').setAttribute("content", `${name} - ${desc}. Buy now at GPU Trades with official brand warranty.`);

        // Headers
        document.getElementById('specs-heading').innerHTML = currentLang === 'ar' ? `<i class="bi bi-list-columns me-2 ms-2 text-orange"></i>المواصفات الفنية الكاملة` : `<i class="bi bi-list-columns me-2 ms-2 text-orange"></i>Full Technical Parameters`;
        document.getElementById('reviews-heading').innerHTML = currentLang === 'ar' ? `<i class="bi bi-chat-left-quote me-2 ms-2 text-orange"></i>تفاصيل التقييمات` : `<i class="bi bi-chat-left-quote me-2 ms-2 text-orange"></i>Reviews Breakdown`;
        document.getElementById('related-heading').innerHTML = currentLang === 'ar' ? `<i class="bi bi-grid-3x3-gap me-2 ms-2 text-orange"></i>القطع ذات الصلة` : `<i class="bi bi-grid-3x3-gap me-2 ms-2 text-orange"></i>Related Components`;

        // 2. Render Main detail layout
        const layoutContainer = document.getElementById('product-detail-layout');
        const discountText = currentLang === 'ar' ? 'خصم' : 'OFF';
        const discountBadge = product.discount ? `<span class="badge bg-danger font-monospace fs-8">${product.discount}% ${discountText}</span>` : '';
        const oldPriceHTML = product.oldPrice ? `<span class="text-decoration-line-through text-muted fs-6" dir="ltr">${formatPrice(product.oldPrice)}</span>` : '';

        // Initialize wishlist state
        const isWishlisted = wishlist.includes(product.id) ? 'active' : '';

        const homeBreadcrumb = currentLang === 'ar' ? 'الرئيسية' : 'Home';
        const hardwareBreadcrumb = currentLang === 'ar' ? 'القطع والأجهزة' : 'Hardware';
        const brandLabel = currentLang === 'ar' ? 'الشركة المصنعة:' : 'Brand Manufacturer:';
        const warrantyLabel = currentLang === 'ar' ? 'الضمان:' : 'Product Warranty:';
        const availLabel = currentLang === 'ar' ? 'حالة التوفر:' : 'Availability:';
        const addToCartText = currentLang === 'ar' ? 'إضافة القطع إلى السلة' : 'Add Components to Cart';
        const reviewsRatingDesc = currentLang === 'ar' ? `(${product.rating} / 5.0 تقييم من ${product.reviewsCount} مراجعة)` : `(${product.rating} / 5.0 Rating from ${product.reviewsCount} reviews)`;

        layoutContainer.innerHTML = `
          <div class="row g-5">
            <!-- Left Gallery Column -->
            <div class="col-lg-6" data-aos="fade-right">
              <div class="zoom-gallery-container">
                <div class="main-zoom-image-wrapper" id="zoom-img-box">
                  <div class="d-flex align-items-center justify-content-center w-100 h-100" style="padding: 25px;">
                    ${product.image}
                  </div>
                </div>
                <div class="d-flex justify-content-center gap-3">
                  <div style="width: 70px; height: 70px; cursor:pointer;" class="bg-glass border-orange rounded p-2 opacity-50 active-thumbnail">
                    ${product.image}
                  </div>
                </div>
              </div>
            </div>
            
            <!-- Right Content Info Column -->
            <div class="col-lg-6 d-flex flex-column justify-content-between" data-aos="fade-left">
              <div>
                <nav aria-label="breadcrumb">
                  <ol class="breadcrumb font-monospace fs-8 mb-2">
                    <li class="breadcrumb-item"><a href="index.html" class="text-muted">${homeBreadcrumb}</a></li>
                    <li class="breadcrumb-item"><a href="products.html" class="text-muted">${hardwareBreadcrumb}</a></li>
                    <li class="breadcrumb-item active text-orange" aria-current="page">${category}</li>
                  </ol>
                </nav>
                
                <h2 class="text-white mb-2 font-monospace fw-bold">${name}</h2>
                <div class="d-flex align-items-center gap-3 mb-4">
                  <div class="product-rating fs-7">${getStarsHTML(product.rating)}</div>
                  <span class="text-muted font-monospace fs-8">${reviewsRatingDesc}</span>
                </div>
                
                <div class="d-flex align-items-center gap-3 mb-4 bg-glass border-orange rounded p-3" style="max-width: fit-content;">
                  <span class="text-white fs-2 font-monospace fw-bold" dir="ltr">${formatPrice(product.price)}</span>
                  ${oldPriceHTML}
                  ${discountBadge}
                </div>

                <p class="text-secondary mb-4 fs-7 font-monospace" style="line-height: 1.7;">${desc}</p>
                
                <div class="border-top border-orange pt-3 mb-4 font-monospace fs-8 text-muted">
                  <div class="mb-2"><i class="bi bi-tag text-orange me-2 ms-2"></i>${brandLabel} <span class="text-white fw-bold">${product.brand}</span></div>
                  <div class="mb-2"><i class="bi bi-shield-check text-orange me-2 ms-2"></i>${warrantyLabel} <span class="text-white fw-bold">${warranty}</span></div>
                  <div class="mb-0"><i class="bi bi-box text-orange me-2 ms-2"></i>${availLabel} <span class="badge bg-glass border-orange text-orange ms-1 fs-9">${availability}</span></div>
                </div>
              </div>
              
              <!-- Actions Block -->
              <div class="d-flex flex-wrap gap-3 align-items-center mt-3">
                <div class="input-group border-orange" style="width: 130px; border: 1px solid var(--border-color); border-radius: var(--border-radius-sm); overflow: hidden;">
                  <button class="btn btn-outline-secondary border-0 text-white font-monospace" type="button" onclick="adjustQty(-1)"><i class="bi bi-dash"></i></button>
                  <input type="text" class="form-control bg-glass text-white border-0 text-center font-monospace fs-7 fw-bold" id="product-qty-val" value="1" readonly>
                  <button class="btn btn-outline-secondary border-0 text-white font-monospace" type="button" onclick="adjustQty(1)"><i class="bi bi-plus"></i></button>
                </div>
                
                <button class="btn btn-gradient px-5 py-3 flex-grow-1 font-monospace fs-7" onclick="handleAddToCartClick()">
                  <i class="bi bi-cart-plus-fill me-2 ms-2"></i>${addToCartText}
                </button>
                
                <button class="btn btn-outline-orange px-4 py-3 wishlist-btn-${product.id} ${isWishlisted}" onclick="toggleWishlist('${product.id}')" title="Add to Wishlist">
                  <i class="bi bi-heart"></i>
                </button>
              </div>
            </div>
          </div>
        `;

        // 3. Render Technical Specifications table
        const specTbody = document.getElementById('detailed-specs-tbody');
        const specs = currentLang === 'ar' ? product.specs_ar : product.specs_en;
        specTbody.innerHTML = Object.entries(specs).map(([key, val]) => `
          <tr>
            <td class="text-orange font-monospace fw-bold py-3 fs-7" style="width: 35%; border-color: rgba(255,255,255,0.05);">${key}</td>
            <td class="text-white font-monospace py-3 fs-7" style="border-color: rgba(255,255,255,0.05);">${val}</td>
          </tr>
        `).join('');

        // 4. Render Reviews
        document.getElementById('breakdown-rating-val').textContent = product.rating.toFixed(1);
        document.getElementById('breakdown-stars').innerHTML = getStarsHTML(product.rating);
        
        const reviewsCountText = currentLang === 'ar' ? `${product.reviewsCount} تقييم` : `${product.reviewsCount} reviews`;
        document.getElementById('breakdown-reviews-count').textContent = reviewsCountText;

        const reviewsList = document.getElementById('product-reviews-list');
        const verifiedText = currentLang === 'ar' ? 'موثق' : 'Verified';
        
        const localReviews = (JSON.parse(localStorage.getItem('gpu_reviews')) || [])
          .filter(r => r.productId === product.id && r.status === 'Approved');
        
        const reviewSource = localReviews.map(r => ({
          name_en: r.customerName,
          name_ar: r.customerName,
          comment_en: r.reviewText,
          comment_ar: r.reviewText,
          rating: r.rating,
          date: r.date,
          avatar: r.avatar || ''
        }));

        if (reviewSource.length === 0) {
          reviewsList.innerHTML = `
            <div class="glass-panel p-4 text-center text-muted font-monospace fs-7">
              ${currentLang === 'ar' ? 'لا توجد تقييمات معتمدة لهذا المنتج بعد' : 'No approved reviews for this product yet'}
            </div>
          `;
        } else {

        reviewsList.innerHTML = reviewSource.map(rev => {
          const name = currentLang === 'ar' ? rev.name_ar : rev.name_en;
          const comment = currentLang === 'ar' ? rev.comment_ar : rev.comment_en;
          const avatarHTML = rev.avatar
            ? `<img src="${rev.avatar}" alt="${name}" class="rounded-circle border border-orange" style="width: 35px; height: 35px;">`
            : `<span class="rounded-circle border border-orange d-inline-flex align-items-center justify-content-center text-orange fw-bold" style="width: 35px; height: 35px;">${name.charAt(0).toUpperCase()}</span>`;
          return `
            <div class="glass-panel p-3 text-start">
              <div class="d-flex align-items-center justify-content-between mb-2">
                <div class="d-flex align-items-center gap-2">
                  ${avatarHTML}
                  <div>
                    <h6 class="text-white mb-0 font-monospace fs-8">${name}</h6>
                    <small class="text-muted" style="font-size: 0.65rem">${rev.date}</small>
                  </div>
                </div>
                <div class="badge bg-glass border-orange text-orange font-monospace fs-9"><i class="bi bi-shield-check me-1 ms-1"></i>${verifiedText}</div>
              </div>
              <div class="product-rating fs-9 mb-2">${getStarsHTML(rev.rating)}</div>
              <p class="text-secondary fs-8 font-monospace mb-0">"${comment}"</p>
            </div>
          `;
        }).join('');
        }

        // 5. Render Related Products
        const relatedWrapper = document.getElementById('related-products-swiper-wrapper');
        const relatedProducts = PRODUCTS_DATA.filter(p => p.category === product.category && p.id !== product.id).slice(0, 5);

        if (relatedProducts.length > 0) {
          relatedWrapper.innerHTML = relatedProducts.map(p => {
            const rName = currentLang === 'ar' ? p.name_ar : p.name_en;
            const rCategory = currentLang === 'ar' ? p.category_ar : p.category_en;
            return `
              <div class="swiper-slide h-auto px-1 py-2">
                <div class="product-card h-100">
                  <button class="product-card-wishlist wishlist-btn-${p.id}" onclick="toggleWishlist('${p.id}')">
                    <i class="bi bi-heart"></i>
                  </button>
                  <a href="product-details.html?id=${p.id}" class="text-decoration-none">
                    <div class="product-card-img-wrapper" style="padding-top: 70%">
                      ${p.image}
                    </div>
                    <div class="product-card-body">
                      <div class="product-category" style="font-size: 0.65rem;">${rCategory}</div>
                      <h6 class="product-title text-white font-monospace fs-7 text-truncate mb-1" title="${rName}">${rName}</h6>
                      <div class="product-price font-monospace text-orange fs-7" dir="ltr">${formatPrice(p.price)}</div>
                    </div>
                  </a>
                </div>
              </div>
            `;
          }).join('');

          // Initialize related swiper
          new Swiper('.related-swiper', {
            loop: false,
            slidesPerView: 2,
            spaceBetween: 15,
            navigation: {
              nextEl: '.swiper-button-next',
              prevEl: '.swiper-button-prev',
            },
            breakpoints: {
              768: { slidesPerView: 3, spaceBetween: 20 },
              992: { slidesPerView: 4, spaceBetween: 20 }
            }
          });
        } else {
          const noRelatedText = currentLang === 'ar' ? `لم يتم العثور على قطع غيار أخرى في فئة "${category}"` : `No other related products found in "${category}" category.`;
          document.querySelector('.related-swiper').innerHTML = `
            <div class="text-center text-muted font-monospace py-4 fs-7">
              ${noRelatedText}
            </div>
          `;
        }

        // Zoom Magnification Effect (Interactive details)
        const zoomImgBox = document.getElementById('zoom-img-box');
        if (zoomImgBox) {
          const svgElement = zoomImgBox.querySelector('svg');
          zoomImgBox.addEventListener('mousemove', (e) => {
            const rect = zoomImgBox.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const xPercent = (x / rect.width) * 100;
            const yPercent = (y / rect.height) * 100;
            
            if (svgElement) {
              svgElement.style.transformOrigin = `${xPercent}% ${yPercent}%`;
              svgElement.style.transform = 'translate(-50%, -50%) scale(1.6)';
            }
          });

          zoomImgBox.addEventListener('mouseleave', () => {
            if (svgElement) {
              svgElement.style.transformOrigin = '50% 50%';
              svgElement.style.transform = 'translate(-50%, -50%) scale(1)';
            }
          });
        }
      }

      // Helper function to render stars
      function getStarsHTML(rating) {
        let stars = '';
        const fullStars = Math.floor(rating);
        const halfStar = rating % 1 >= 0.5;
        for (let i = 1; i <= 5; i++) {
          if (i <= fullStars) {
            stars += '<i class="bi bi-star-fill text-warning"></i>';
          } else if (i === fullStars + 1 && halfStar) {
            stars += '<i class="bi bi-star-half text-warning"></i>';
          } else {
            stars += '<i class="bi bi-star text-muted"></i>';
          }
        }
        return stars;
      }

      renderDetails();

      // Listen to language changes
      window.addEventListener('languageChanged', renderDetails);

      // Quantity controls
      window.adjustQty = function(amt) {
        const valInput = document.getElementById('product-qty-val');
        let currentVal = parseInt(valInput.value);
        currentVal += amt;
        if (currentVal < 1) currentVal = 1;
        if (currentVal > 10) {
          currentVal = 10;
          const maxLimitText = getCurrentLang() === 'ar' ? 'تم الوصول للحد الأقصى للكمية (10 قطع)' : 'Maximum quantity limit of 10 reached';
          showToast(maxLimitText, "error");
        }
        valInput.value = currentVal;
      };

      window.handleAddToCartClick = function() {
        const qty = parseInt(document.getElementById('product-qty-val').value);
        addToCart(productId, qty);
      };
    }

    document.addEventListener('DOMContentLoaded', initProductDetailsPage);
  </script>
</body>
</html>
