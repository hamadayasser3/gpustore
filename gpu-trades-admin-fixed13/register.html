<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create E-Commerce Account | GPU Trades</title>
  
  <meta name="description" content="Register an account with GPU Trades to save custom PC builds, manage shipping addresses, and compile graphics configurations.">
  <link rel="canonical" href="register.html">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet" id="bootstrap-css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  
  <link href="assets/css/style.css" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/supabase-sync.js"></script>
  <script src="assets/js/products-data.js"></script>
  <script src="assets/js/cart-wishlist.js"></script>
</head>
<body>

  <!-- Preloader -->
  <div id="loading-screen">
    <div class="loader-circuit-container">
      <div class="loader-ring"></div>
      <div class="loader-cpu-chip"></div>
    </div>
    <div class="font-monospace text-orange fs-7 mt-3 animate-pulse" data-translate="register-boot">جاري إنشاء قنوات حساب النظام...</div>
  </div>

  <!-- Header -->
  <script src="assets/js/main.js"></script>
  <script>renderPremiumHeader();</script>

  <!-- Register Form -->
  <section class="py-5 mt-4">
    <div class="container d-flex justify-content-center">
      <div class="w-100" style="max-width: 480px;" data-aos="zoom-in">
        
        <div class="glass-panel p-4 p-md-5 border-orange glow-orange">
          <div class="text-center mb-4">
            <img src="assets/img/logo.png" alt="GPU Trades Logo" class="mb-3" style="height: 60px; width: auto;">
            <h4 class="text-white font-monospace text-uppercase text-orange lang-ar"><i class="bi bi-person-plus-fill me-2 ms-2"></i>إنشاء حساب جديد</h4>
            <h4 class="text-white font-monospace text-uppercase text-orange lang-en"><i class="bi bi-person-plus-fill me-2"></i>CREATE ACCOUNT</h4>
            <span class="text-muted font-monospace fs-8 lang-ar">أنشئ حسابك لإدارة وتخصيص تجميعاتك</span>
            <span class="text-muted font-monospace fs-8 lang-en">Establish credentials to configure workstations</span>
          </div>

          <!-- Arabic Form -->
          <form id="register-form-ar" class="register-form-bilingual lang-ar" novalidate>
            <div class="mb-3">
              <label class="form-label font-monospace fs-8 text-muted">الاسم الكامل</label>
              <div class="input-group border-orange" style="border: 1px solid var(--border-color); border-radius: var(--border-radius-sm); overflow: hidden;">
                <span class="input-group-text bg-glass border-0 text-orange"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control bg-glass text-white border-0 font-monospace fs-7 px-3 py-2 reg-name-input" placeholder="مثال: أحمد محمد" required style="outline: none; box-shadow: none;">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label font-monospace fs-8 text-muted">البريد الإلكتروني</label>
              <div class="input-group border-orange" style="border: 1px solid var(--border-color); border-radius: var(--border-radius-sm); overflow: hidden;">
                <span class="input-group-text bg-glass border-0 text-orange"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control bg-glass text-white border-0 font-monospace fs-7 px-3 py-2 reg-email-input" placeholder="مثال: ahmed@domain.com" required style="outline: none; box-shadow: none;">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label font-monospace fs-8 text-muted">رقم الهاتف</label>
              <div class="input-group border-orange" style="border: 1px solid var(--border-color); border-radius: var(--border-radius-sm); overflow: hidden;">
                <span class="input-group-text bg-glass border-0 text-orange"><i class="bi bi-telephone"></i></span>
                <input type="tel" class="form-control bg-glass text-white border-0 font-monospace fs-7 px-3 py-2 reg-phone-input" placeholder="مثال: 01012345678" required style="outline: none; box-shadow: none;">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label font-monospace fs-8 text-muted">كلمة المرور</label>
              <div class="input-group border-orange" style="border: 1px solid var(--border-color); border-radius: var(--border-radius-sm); overflow: hidden;">
                <span class="input-group-text bg-glass border-0 text-orange"><i class="bi bi-key"></i></span>
                <input type="password" class="form-control bg-glass text-white border-0 font-monospace fs-7 px-3 py-2 reg-password-input" placeholder="٨ أحرف على الأقل" required style="outline: none; box-shadow: none;">
              </div>
              
              <!-- Password Strength Meter -->
              <div class="mt-2">
                <div class="progress bg-glass mb-1" style="height: 4px; width: 100%;">
                  <div class="progress-bar reg-strength-bar" style="width: 0%; transition: all 0.3s ease;"></div>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                  <span class="font-monospace fs-9 text-muted">مستوى الأمان:</span>
                  <span class="font-monospace fs-9 fw-bold text-muted reg-strength-label">بدون</span>
                </div>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label font-monospace fs-8 text-muted">تأكيد كلمة المرور</label>
              <div class="input-group border-orange" style="border: 1px solid var(--border-color); border-radius: var(--border-radius-sm); overflow: hidden;">
                <span class="input-group-text bg-glass border-0 text-orange"><i class="bi bi-shield-lock"></i></span>
                <input type="password" class="form-control bg-glass text-white border-0 font-monospace fs-7 px-3 py-2 reg-confirm-password-input" placeholder="أعد إدخال كلمة المرور" required style="outline: none; box-shadow: none;">
              </div>
            </div>

            <div class="mb-4">
              <label class="custom-checkbox-orange">
                أوافق على <a href="terms.html" class="text-orange text-decoration-none">شروط الخدمة</a> و <a href="privacy.html" class="text-orange text-decoration-none">سياسة الخصوصية</a>
                <input type="checkbox" class="reg-terms-input">
                <span class="checkbox-checkmark"></span>
              </label>
            </div>

            <button class="btn btn-gradient w-100 py-3 font-monospace fs-7 mb-4" type="submit">
              <i class="bi bi-person-check-fill me-2 ms-2"></i>إنشاء حساب النظام
            </button>

            <div class="text-center font-monospace fs-8 text-muted">
              <span>لديك حساب بالفعل؟ </span>
              <a href="login.html" class="text-orange text-decoration-none hover-white">سجل الدخول هنا</a>
            </div>
          </form>

          <!-- English Form -->
          <form id="register-form-en" class="register-form-bilingual lang-en" novalidate>
            <div class="mb-3">
              <label class="form-label font-monospace fs-8 text-muted">Full Name</label>
              <div class="input-group border-orange" style="border: 1px solid var(--border-color); border-radius: var(--border-radius-sm); overflow: hidden;">
                <span class="input-group-text bg-glass border-0 text-orange"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control bg-glass text-white border-0 font-monospace fs-7 px-3 py-2 reg-name-input" placeholder="e.g., Alex Mercer" required style="outline: none; box-shadow: none;">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label font-monospace fs-8 text-muted">Email Address</label>
              <div class="input-group border-orange" style="border: 1px solid var(--border-color); border-radius: var(--border-radius-sm); overflow: hidden;">
                <span class="input-group-text bg-glass border-0 text-orange"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control bg-glass text-white border-0 font-monospace fs-7 px-3 py-2 reg-email-input" placeholder="e.g., alex@domain.com" required style="outline: none; box-shadow: none;">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label font-monospace fs-8 text-muted">Phone Number</label>
              <div class="input-group border-orange" style="border: 1px solid var(--border-color); border-radius: var(--border-radius-sm); overflow: hidden;">
                <span class="input-group-text bg-glass border-0 text-orange"><i class="bi bi-telephone"></i></span>
                <input type="tel" class="form-control bg-glass text-white border-0 font-monospace fs-7 px-3 py-2 reg-phone-input" placeholder="e.g., +201012345678" required style="outline: none; box-shadow: none;">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label font-monospace fs-8 text-muted">Password</label>
              <div class="input-group border-orange" style="border: 1px solid var(--border-color); border-radius: var(--border-radius-sm); overflow: hidden;">
                <span class="input-group-text bg-glass border-0 text-orange"><i class="bi bi-key"></i></span>
                <input type="password" class="form-control bg-glass text-white border-0 font-monospace fs-7 px-3 py-2 reg-password-input" placeholder="Min. 8 characters" required style="outline: none; box-shadow: none;">
              </div>
              
              <!-- Password Strength Meter -->
              <div class="mt-2">
                <div class="progress bg-glass mb-1" style="height: 4px; width: 100%;">
                  <div class="progress-bar reg-strength-bar" style="width: 0%; transition: all 0.3s ease;"></div>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                  <span class="font-monospace fs-9 text-muted">Strength Profile:</span>
                  <span class="font-monospace fs-9 fw-bold text-muted reg-strength-label">None</span>
                </div>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label font-monospace fs-8 text-muted">Confirm Password</label>
              <div class="input-group border-orange" style="border: 1px solid var(--border-color); border-radius: var(--border-radius-sm); overflow: hidden;">
                <span class="input-group-text bg-glass border-0 text-orange"><i class="bi bi-shield-lock"></i></span>
                <input type="password" class="form-control bg-glass text-white border-0 font-monospace fs-7 px-3 py-2 reg-confirm-password-input" placeholder="Re-enter password" required style="outline: none; box-shadow: none;">
              </div>
            </div>

            <div class="mb-4">
              <label class="custom-checkbox-orange">
                I agree to the <a href="terms.html" class="text-orange text-decoration-none">Terms of Service</a> & <a href="privacy.html" class="text-orange text-decoration-none">Privacy Policy</a>
                <input type="checkbox" class="reg-terms-input">
                <span class="checkbox-checkmark"></span>
              </label>
            </div>

            <button class="btn btn-gradient w-100 py-3 font-monospace fs-7 mb-4" type="submit">
              <i class="bi bi-person-check-fill me-2"></i>Create System Account
            </button>

            <div class="text-center font-monospace fs-8 text-muted">
              <span>Already possess an account? </span>
              <a href="login.html" class="text-orange text-decoration-none hover-white">Login Here</a>
            </div>
          </form>
        </div>

      </div>
    </div>
  </section>

  <!-- Footer -->
  <script>renderPremiumFooter();</script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <!-- Registration script -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.register-form-bilingual').forEach(form => {
        const nameInput = form.querySelector('.reg-name-input');
        const emailInput = form.querySelector('.reg-email-input');
        const passwordInput = form.querySelector('.reg-password-input');
        const confirmInput = form.querySelector('.reg-confirm-password-input');
        const phoneInput = form.querySelector('.reg-phone-input');
        const termsInput = form.querySelector('.reg-terms-input');

        const strengthBar = form.querySelector('.reg-strength-bar');
        const strengthLabel = form.querySelector('.reg-strength-label');

        // Live Password Strength Checker
        passwordInput.addEventListener('input', (e) => {
          const value = e.target.value;
          const currentLang = getCurrentLang();
          let score = 0;
          
          if (value.length >= 8) score += 25;
          if (/[A-Z]/.test(value)) score += 25;
          if (/[0-9]/.test(value)) score += 25;
          if (/[^A-Za-z0-9]/.test(value)) score += 25;

          // Visual mapping
          strengthBar.style.width = `${score}%`;
          
          if (score === 0) {
            strengthBar.className = "progress-bar";
            strengthLabel.textContent = currentLang === 'ar' ? "بدون" : "None";
            strengthLabel.className = "font-monospace fs-9 fw-bold text-muted";
          } else if (score <= 50) {
            strengthBar.className = "progress-bar bg-danger";
            strengthLabel.textContent = currentLang === 'ar' ? "ضعيف" : "Weak";
            strengthLabel.className = "font-monospace fs-9 fw-bold text-danger";
          } else if (score <= 75) {
            strengthBar.className = "progress-bar bg-warning";
            strengthLabel.textContent = currentLang === 'ar' ? "متوسط" : "Medium";
            strengthLabel.className = "font-monospace fs-9 fw-bold text-warning";
          } else {
            strengthBar.className = "progress-bar bg-success";
            strengthLabel.textContent = currentLang === 'ar' ? "قوي" : "Strong";
            strengthLabel.className = "font-monospace fs-9 fw-bold text-success";
          }
        });

        // Submit Form
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          const currentLang = getCurrentLang();

          const nameVal = nameInput.value.trim();
          const emailVal = emailInput.value.trim();
          const phoneVal = phoneInput.value.trim();
          const pwdVal = passwordInput.value;
          const confirmVal = confirmInput.value;
          const termsVal = termsInput.checked;

          if (nameVal.length < 3) {
            const err = currentLang === 'ar' ? "يجب أن يحتوي الاسم على 3 أحرف على الأقل" : "Name must contain at least 3 letters";
            showToast(err, "error");
            return;
          }

          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailRegex.test(emailVal)) {
            const err = currentLang === 'ar' ? "يرجى تقديم عنوان بريد إلكتروني صالح" : "Please provide a valid email address";
            showToast(err, "error");
            return;
          }

          if (phoneVal.length < 5) {
            const err = currentLang === 'ar' ? "يرجى إدخال رقم هاتف صحيح" : "Please enter a valid phone number";
            showToast(err, "error");
            return;
          }

          if (pwdVal.length < 8) {
            const err = currentLang === 'ar' ? "يجب أن تتكون كلمة المرور من 8 أحرف على الأقل" : "Password must compile at least 8 characters";
            showToast(err, "error");
            return;
          }

          if (pwdVal !== confirmVal) {
            const err = currentLang === 'ar' ? "تأكيد كلمة المرور غير متطابق" : "Confirm Password credentials do not match";
            showToast(err, "error");
            return;
          }

          if (!termsVal) {
            const err = currentLang === 'ar' ? "يرجى قبول شروط الخدمة وسياسة الخصوصية" : "Please accept user terms and conditions policies";
            showToast(err, "error");
            return;
          }

          // Register via Supabase Auth
          const submitBtn = form.querySelector('button[type="submit"]');
          submitBtn.disabled = true;

          const { data, error } = await window.sb.auth.signUp({
            email: emailVal,
            password: pwdVal,
            options: {
              data: {
                full_name: nameVal,
                phone: phoneVal
              }
            }
          });

          if (error) {
            submitBtn.disabled = false;
            let err = error.message;
            if (/already registered|already exists/i.test(err)) {
              err = currentLang === 'ar' ? "يوجد حساب مسجل بهذا البريد الإلكتروني بالفعل" : "An account with this email already exists";
            }
            showToast(err, "error");
            return;
          }

          // Trigger database pull to update local cache of users
          if (window.gpuSync && window.gpuSync.pull) {
            await window.gpuSync.pull();
          }

          // Simulated Success
          const successMsg = currentLang === 'ar' ? "تم إنشاء الحساب بنجاح! جاري تحويلك لبوابة الدخول." : "Account Created! Directing to authentication gateway.";
          showToast(successMsg, "success");
          
          setTimeout(() => {
            const params = new URLSearchParams(window.location.search);
            const redirectTo = params.get('redirect');
            window.location.href = redirectTo ? 'login.html?redirect=' + encodeURIComponent(redirectTo) : 'login.html';
          }, 1500);
        });
      });
    });
  </script>
</body>
<script>
  (function preserveRedirectParamOnLoginLink() {
    const params = new URLSearchParams(window.location.search);
    const redirectTo = params.get('redirect');
    if (!redirectTo) return;
    document.querySelectorAll('a[href="login.html"]').forEach(a => {
      a.href = 'login.html?redirect=' + encodeURIComponent(redirectTo);
    });
  })();
</script>
</html>
