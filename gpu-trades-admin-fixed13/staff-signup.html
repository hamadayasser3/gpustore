<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إكمال تسجيل حساب موظف | GPU Trades</title>
  <meta name="robots" content="noindex, nofollow">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <link href="assets/css/admin.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
</head>
<body class="admin-body">

  <div style="width:100%; min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--admin-bg-canvas); padding:1.5rem;">
    <div style="width:100%; max-width:440px;" class="admin-card">

      <div class="text-center mb-4">
        <i class="bi bi-person-check-fill" style="font-size:2.5rem; color:var(--admin-primary);"></i>
        <h4 class="mt-2 mb-1">إكمال تسجيل حساب موظف</h4>
        <p class="text-muted fs-8 mb-0">تمت دعوتك للانضمام إلى فريق لوحة تحكم GPU Trades. أنشئ كلمة مرورك الخاصة لتفعيل حسابك.</p>
      </div>

      <div id="signup-error" class="alert alert-danger py-2 fs-8" style="display:none;"></div>
      <div id="signup-success" class="alert alert-success py-2 fs-8" style="display:none;"></div>

      <form id="staff-signup-form">
        <div class="mb-3">
          <label class="admin-form-label">الاسم الكامل</label>
          <input type="text" id="signup-name" class="form-control admin-form-control" required>
        </div>
        <div class="mb-3">
          <label class="admin-form-label">البريد الإلكتروني (المستخدَم في الدعوة)</label>
          <input type="email" id="signup-email" class="form-control admin-form-control" required>
        </div>
        <div class="mb-3">
          <label class="admin-form-label">كلمة المرور</label>
          <input type="password" id="signup-password" class="form-control admin-form-control" placeholder="8 أحرف على الأقل" required minlength="8">
        </div>
        <div class="mb-3">
          <label class="admin-form-label">تأكيد كلمة المرور</label>
          <input type="password" id="signup-password-confirm" class="form-control admin-form-control" required minlength="8">
        </div>
        <button type="submit" id="signup-submit-btn" class="btn w-100 py-2" style="background:var(--admin-primary); color:#fff;">
          <i class="bi bi-shield-check me-1"></i> إنشاء الحساب
        </button>
      </form>

      <div class="text-center mt-3">
        <a href="admin.html" class="fs-9 text-muted"><i class="bi bi-arrow-right me-1"></i>الذهاب لتسجيل الدخول</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('staff-signup-form');
    const errorBox = document.getElementById('signup-error');
    const successBox = document.getElementById('signup-success');
    const submitBtn = document.getElementById('signup-submit-btn');

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
      successBox.style.display = 'none';
      submitBtn.disabled = false;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';
      successBox.style.display = 'none';
      submitBtn.disabled = true;

      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const passwordConfirm = document.getElementById('signup-password-confirm').value;

      if (password !== passwordConfirm) {
        showError('كلمتا المرور غير متطابقتين.');
        return;
      }

      try {
        // 1) Make sure there really is a pending invite for this email
        //    (readable under RLS: "invited user can read own invite").
        const { data: invite, error: inviteErr } = await window.sb
          .from('staff_invites')
          .select('*')
          .eq('email', email)
          .eq('used', false)
          .maybeSingle();

        if (inviteErr || !invite) {
          showError('لا توجد دعوة نشطة بهذا البريد الإلكتروني. تواصل مع المشرف العام.');
          return;
        }

        // 2) Create the real Supabase Auth account.
        const { data: signUpData, error: signUpErr } = await window.sb.auth.signUp({ email, password });
        if (signUpErr) {
          if (/already registered|already exists/i.test(signUpErr.message)) {
            showError('يوجد حساب مسجل بهذا البريد الإلكتروني بالفعل. سجّل الدخول مباشرة من admin.html.');
          } else {
            showError(signUpErr.message);
          }
          return;
        }

        if (!signUpData.session) {
          successBox.textContent = 'تم إرسال رابط تأكيد إلى بريدك الإلكتروني. بعد التأكيد سجّل الدخول من admin.html وسيتم ربط حسابك بالدعوة تلقائياً.';
          successBox.style.display = 'block';
          // Try to accept the invite right away in case confirmation isn't required.
          await window.sb.rpc('accept_staff_invite', { p_full_name: name }).catch(() => {});
          return;
        }

        // 3) Turn that auth user into the invited staff member.
        const { error: acceptErr } = await window.sb.rpc('accept_staff_invite', { p_full_name: name });
        if (acceptErr) {
          showError('تعذر ربط حسابك بالدعوة: ' + acceptErr.message);
          return;
        }

        successBox.textContent = 'تم إنشاء حسابك بنجاح! يمكنك الآن تسجيل الدخول من لوحة التحكم.';
        successBox.style.display = 'block';
        form.reset();
        setTimeout(() => window.location.href = 'admin.html', 1800);
      } catch (err) {
        showError('حدث خطأ غير متوقع. حاول مرة أخرى.');
        console.error(err);
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
