<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Hardware Categories | GPU Trades</title>
  
  <meta name="description" content="Explore computer hardware categories at GPU Trades. Shop gaming PCs, custom graphic cards, high frequency RAM, motherboards and cooling modules.">
  <link rel="canonical" href="categories.html">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet" id="bootstrap-css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  
  <link href="assets/css/style.css" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/supabase-sync.js"></script>
  <script src="assets/js/products-data.js"></script>
  <script src="assets/js/cart-wishlist.js"></script>
  <script src="assets/js/auth-guard.js"></script>
  <script src="assets/js/whatsapp-invite.js"></script>
</head>
<body>

  <!-- Preloader -->
  <div id="loading-screen">
    <div class="loader-circuit-container">
      <div class="loader-ring"></div>
      <div class="loader-cpu-chip"></div>
    </div>
    <div class="font-monospace text-orange fs-7 mt-3 animate-pulse" data-translate="categories-boot">جاري فهرسة أقسام الأجهزة والقطع...</div>
  </div>

  <!-- Header -->
  <script src="assets/js/main.js"></script>
  <script>renderPremiumHeader();</script>

  <!-- Page Banner -->
  <section class="py-5 position-relative overflow-hidden bg-glass border-bottom border-orange">
    <div class="circuit-overlay"></div>
    <div class="container text-center py-3 position-relative z-1">
      <h1 class="display-5 text-white mb-2" data-translate="categories-title">أقسام الأجهزة</h1>
      <p class="text-muted font-monospace fs-7" data-translate="categories-desc">اختر فئة من فئات القطع لتصفية المنتجات ومراجعة مواصفات التوافق.</p>
    </div>
  </section>

  <!-- Categories Grid -->
  <section class="py-5">
    <div class="container">
      <div class="row g-4" id="categories-showcase-grid">
        <!-- Injected dynamically via JS -->
      </div>
    </div>
  </section>

  <!-- Custom Build PC Callout -->
  <section class="py-5 bg-glass border-top border-bottom border-orange position-relative overflow-hidden">
    <div class="circuit-overlay"></div>
    <div class="container text-center position-relative z-1 py-4">
      <span class="text-orange font-monospace text-uppercase fw-bold d-block mb-2 fs-7" data-translate="custom-pc"><i class="bi bi-gear-wide-connected me-2 ms-2"></i>محاكي تجميع الأجهزة</span>
      <h2 class="text-white display-6 mb-3" data-translate="simulator-title">هل تحتاج تجميعة مخصصة؟</h2>
      <p class="text-muted font-monospace fs-7 max-w-600 mx-auto mb-4" data-translate="simulator-desc">
        يمكن لمهندسينا المحترفين تجميع تكوينات متوافقة تطابق المعالجات وكروت الشاشة والباور سبلاي المناسب لاحتياجاتك.
      </p>
      <a href="contact.html" class="btn btn-gradient px-4 py-3 font-monospace fs-7" data-translate="consult-builder"><i class="bi bi-headset me-2 ms-2"></i>استشر خبير تجميع الأجهزة</a>
    </div>
  </section>

  <!-- Footer -->
  <script>renderPremiumFooter();</script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <!-- Dynamic Category Aggregator -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      const grid = document.getElementById('categories-showcase-grid');
      
      // Category SVGs mapping representing the hardware class
      const categorySVGs = {
        "Gaming PCs": `<svg viewBox="0 0 100 100" class="hardware-vector" width="55" height="55">
          <rect x="25" y="10" width="50" height="80" rx="6" fill="none" stroke="#FF6A00" stroke-width="2" />
          <circle cx="50" cy="35" r="10" stroke="#FF3D00" stroke-width="1.5" stroke-dasharray="2 1" fill="none" />
          <circle cx="50" cy="65" r="10" stroke="#FF3D00" stroke-width="1.5" stroke-dasharray="2 1" fill="none" />
          <line x1="25" y1="18" x2="75" y2="18" stroke="#FF6A00" stroke-width="1.5" />
        </svg>`,
        "Gaming Laptops": `<svg viewBox="0 0 100 100" class="hardware-vector" width="55" height="55">
          <rect x="20" y="20" width="60" height="45" rx="4" fill="none" stroke="#FF6A00" stroke-width="2" />
          <polygon points="10,75 90,75 95,85 5,85" fill="none" stroke="#FF3D00" stroke-width="2" />
        </svg>`,
        "RTX Graphics Cards": `<svg viewBox="0 0 100 100" class="hardware-vector" width="55" height="55">
          <rect x="15" y="30" width="70" height="40" rx="5" fill="none" stroke="#FF6A00" stroke-width="2" />
          <circle cx="35" cy="50" r="10" stroke="#FF3D00" stroke-width="1.5" fill="none" />
          <circle cx="65" cy="50" r="10" stroke="#FF3D00" stroke-width="1.5" fill="none" />
        </svg>`,
        "Desktop PCs": `<svg viewBox="0 0 100 100" class="hardware-vector" width="55" height="55">
          <rect x="30" y="10" width="40" height="80" rx="4" fill="none" stroke="#FF6A00" stroke-width="2" />
          <line x1="30" y1="25" x2="70" y2="25" stroke="#FF3D00" stroke-width="1.5" />
          <line x1="30" y1="75" x2="70" y2="75" stroke="#FF3D00" stroke-width="1.5" />
        </svg>`,
        "Business Laptops": `<svg viewBox="0 0 100 100" class="hardware-vector" width="55" height="55">
          <rect x="25" y="25" width="50" height="40" rx="3" fill="none" stroke="#FF6A00" stroke-width="2" />
          <line x1="15" y1="70" x2="85" y2="70" stroke="#FF3D00" stroke-width="2" />
        </svg>`,
        "Processors": `<svg viewBox="0 0 100 100" class="hardware-vector" width="55" height="55">
          <rect x="25" y="25" width="50" height="50" rx="3" fill="none" stroke="#FF6A00" stroke-width="2" />
          <rect x="33" y="33" width="34" height="34" fill="none" stroke="#FF3D00" stroke-width="1.5" />
        </svg>`,
        "Motherboards": `<svg viewBox="0 0 100 100" class="hardware-vector" width="55" height="55">
          <rect x="20" y="20" width="60" height="60" rx="5" fill="none" stroke="#FF6A00" stroke-width="2" />
          <rect x="40" y="30" width="20" height="20" fill="none" stroke="#FF3D00" stroke-width="1.5" />
          <line x1="30" y1="65" x2="70" y2="65" stroke="#FF6A00" stroke-width="2" />
        </svg>`,
        "RAM": `<svg viewBox="0 0 100 100" class="hardware-vector" width="55" height="55">
          <rect x="15" y="40" width="70" height="20" rx="2" fill="none" stroke="#FF6A00" stroke-width="2" />
          <line x1="20" y1="65" x2="80" y2="65" stroke="#FF3D00" stroke-width="3" stroke-dasharray="2 1" />
        </svg>`,
        "SSD": `<svg viewBox="0 0 100 100" class="hardware-vector" width="55" height="55">
          <rect x="20" y="40" width="60" height="20" rx="1" fill="none" stroke="#FF6A00" stroke-width="2" />
          <rect x="25" y="45" width="10" height="10" fill="#FF3D00" />
          <rect x="40" y="45" width="10" height="10" fill="#FF6A00" />
        </svg>`,
        "Monitors": `<svg viewBox="0 0 100 100" class="hardware-vector" width="55" height="55">
          <path d="M 15,30 C 40,25 60,25 85,30 L 85,70 C 60,65 40,65 15,70 Z" fill="none" stroke="#FF6A00" stroke-width="2" />
          <path d="M 50,70 L 45,90 H 55 Z" fill="none" stroke="#FF3D00" stroke-width="1.5" />
        </svg>`,
        "Mechanical Keyboards": `<svg viewBox="0 0 100 100" class="hardware-vector" width="55" height="55">
          <rect x="15" y="35" width="70" height="30" rx="3" fill="none" stroke="#FF6A00" stroke-width="2" />
          <line x1="25" y1="45" x2="75" y2="45" stroke="#FF3D00" stroke-width="1.5" stroke-dasharray="4 2" />
          <line x1="25" y1="53" x2="75" y2="53" stroke="#FF6A00" stroke-width="1.5" stroke-dasharray="6 3" />
        </svg>`,
        "Gaming Mouse": `<svg viewBox="0 0 100 100" class="hardware-vector" width="55" height="55">
          <path d="M 35,30 C 35,15 65,15 65,30 L 68,70 C 68,85 58,90 50,90 C 42,90 32,85 32,70 Z" fill="none" stroke="#FF6A00" stroke-width="2" />
          <line x1="50" y1="20" x2="50" y2="45" stroke="#FF3D00" stroke-width="1.5" />
        </svg>`,
        "Headsets": `<svg viewBox="0 0 100 100" class="hardware-vector" width="55" height="55">
          <path d="M 25,60 C 25,25 75,25 75,60" fill="none" stroke="#FF6A00" stroke-width="3" />
          <rect x="15" y="55" width="12" height="22" rx="4" fill="none" stroke="#FF3D00" stroke-width="2" />
          <rect x="73" y="55" width="12" height="22" rx="4" fill="none" stroke="#FF3D00" stroke-width="2" />
        </svg>`,
        "Cooling Systems": `<svg viewBox="0 0 100 100" class="hardware-vector" width="55" height="55">
          <circle cx="50" cy="50" r="30" stroke="#FF6A00" stroke-width="2" stroke-dasharray="6 2" fill="none" />
          <circle cx="50" cy="50" r="5" fill="#FF3D00" />
        </svg>`,
        "Power Supplies": `<svg viewBox="0 0 100 100" class="hardware-vector" width="55" height="55">
          <rect x="20" y="20" width="60" height="60" rx="4" fill="none" stroke="#FF6A00" stroke-width="2" />
          <circle cx="50" cy="50" r="20" stroke="#FF3D00" stroke-width="1.5" stroke-dasharray="4 2" fill="none" />
        </svg>`,
        "HDD": `<svg viewBox="0 0 100 100" class="hardware-vector" width="55" height="55">
          <rect x="25" y="20" width="50" height="60" rx="3" fill="none" stroke="#FF6A00" stroke-width="2" />
          <circle cx="50" cy="45" r="18" stroke="#FF3D00" stroke-width="1.5" fill="none" />
          <line x1="50" y1="45" x2="65" y2="60" stroke="#FF6A00" stroke-width="1.5" />
        </svg>`,
        "Accessories": `<svg viewBox="0 0 100 100" class="hardware-vector" width="55" height="55">
          <path d="M 25,30 C 50,30 50,70 75,70" fill="none" stroke="#FF6A00" stroke-width="3" />
          <path d="M 25,50 C 50,50 50,90 75,90" fill="none" stroke="#FF3D00" stroke-width="3" />
        </svg>`
      };

      function renderCategories() {
        const currentLang = getCurrentLang();
        const itemsText = currentLang === 'ar' ? 'قطع متوفرة' : 'Available Items';
        // Recomputed fresh each call so post-sync product updates are reflected
        const uniqueCategories = [...new Set(PRODUCTS_DATA.map(p => p.category))];

        if (uniqueCategories.length === 0) {
          grid.innerHTML = `
            <div class="col-12">
              <div class="glass-panel p-5 text-center">
                <i class="bi bi-folder2-open text-orange display-3 d-block mb-3"></i>
                <h4 class="text-white font-monospace">${currentLang === 'ar' ? 'لا توجد أقسام بعد' : 'No categories yet'}</h4>
                <p class="text-muted font-monospace fs-7 mb-0">${currentLang === 'ar' ? 'ستظهر أقسام المتجر تلقائيًا بعد إضافة المنتجات أو الأقسام من لوحة الإدارة.' : 'Store categories will appear after products or categories are added from the admin panel.'}</p>
              </div>
            </div>
          `;
          return;
        }

        grid.innerHTML = uniqueCategories.map((cat, index) => {
          const product = PRODUCTS_DATA.find(p => p.category === cat);
          const catName = currentLang === 'ar' ? (product ? product.category_ar : cat) : (product ? product.category_en : cat);
          const itemCount = PRODUCTS_DATA.filter(p => p.category === cat).length;
          const svgIcon = categorySVGs[cat] || `<svg viewBox="0 0 100 100" class="hardware-vector" width="55" height="55"><rect x="30" y="30" width="40" height="40" stroke="#FF6A00" stroke-width="2" fill="none"/></svg>`;
          const aosDelay = (index % 4) * 100;

          return `
            <div class="col-xl-3 col-lg-4 col-sm-6 col-12" data-aos="fade-up" data-aos-delay="${aosDelay}">
              <a href="products.html?category=${encodeURIComponent(cat)}" class="text-decoration-none">
                <div class="hardware-comp-card h-100">
                  <div class="mb-3 d-flex justify-content-center">
                    ${svgIcon}
                  </div>
                  <h5 class="text-white mb-2 font-monospace">${catName}</h5>
                  <span class="badge bg-glass border-orange text-orange font-monospace fs-9">${itemCount} ${itemsText}</span>
                </div>
              </a>
            </div>
          `;
        }).join('');
      }

      renderCategories();
      window.addEventListener('languageChanged', renderCategories);
      window.addEventListener('gpu:synced', renderCategories);
    });
  </script>
</body>
</html>
