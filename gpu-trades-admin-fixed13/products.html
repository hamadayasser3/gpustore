<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite PC Hardware Catalog | GPU Trades</title>
  
  <meta name="description" content="Browse our premium inventory of custom gaming PCs, laptops, graphics cards, processors, motherboards, storage, and accessories at GPU Trades.">
  <meta name="keywords" content="GPU, catalog, hardware catalog, custom gaming PC, RTX graphics cards, processors, motherboards, RAM, SSD">
  <link rel="canonical" href="products.html">
  
  <meta property="og:type" content="website">
  <meta property="og:url" content="products.html">
  <meta property="og:title" content="Elite PC Hardware Catalog | GPU Trades">
  <meta property="og:description" content="Build your dream setup. Find genuine graphics cards, high-frequency RAM, Gen5 SSDs, and elite processors in our catalog.">
  <meta property="og:image" content="assets/img/logo.png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet" id="bootstrap-css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  
  <link href="assets/css/style.css" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/supabase-sync.js"></script>
  <script src="assets/js/products-data.js"></script>
  <script src="assets/js/cart-wishlist.js"></script>
  <script src="assets/js/auth-guard.js"></script>
  <script src="assets/js/whatsapp-invite.js"></script>
</head>
<body>

  <!-- Preloader -->
  <div id="loading-screen">
    <div class="loader-circuit-container">
      <div class="loader-ring"></div>
      <div class="loader-cpu-chip"></div>
    </div>
    <div class="font-monospace text-orange fs-7 mt-3 animate-pulse" data-translate="system-boot">جاري تحميل نظام التشغيل...</div>
  </div>

  <!-- Header -->
  <script src="assets/js/main.js"></script>
  <script>renderPremiumHeader();</script>

  <!-- Page Banner -->
  <section class="py-5 position-relative overflow-hidden bg-glass border-bottom border-orange">
    <div class="circuit-overlay"></div>
    <div class="container text-center py-3 position-relative z-1">
      <h1 class="display-5 text-white mb-2" data-translate="nav-hardware">القطع والأجهزة</h1>
      <p class="text-muted font-monospace fs-7" data-translate="best-sellers-desc">القطع الأكثر شعبية في متجرنا</p>
    </div>
  </section>

  <!-- Products Main Content -->
  <section class="py-5">
    <div class="container">
      <div class="row g-4">
        
        <!-- Filters Sidebar -->
        <div class="col-lg-3 col-md-4">
          <div class="glass-panel p-4 sticky-top" style="top: 100px; z-index: 10;">
            <div class="d-flex align-items-center justify-content-between mb-4 pb-2 border-bottom border-orange" style="border-width: 2px !important;">
              <h5 class="text-white mb-0 font-monospace text-orange" data-translate="filters"><i class="bi bi-funnel-fill me-2 ms-2"></i>تصفية المنتجات</h5>
              <button class="btn btn-sm btn-outline-orange font-monospace py-0 px-2" style="font-size: 0.7rem;" id="clear-filters-btn" data-translate="clear-filters">إعادة تعيين</button>
            </div>
            
            <!-- Category Filter -->
            <div class="mb-4">
              <h6 class="filter-section-title font-monospace" data-translate="footer-categories">Categories</h6>
              <div id="categories-filter-list">
                <!-- Injected dynamically -->
              </div>
            </div>

            <!-- Brand Filter -->
            <div class="mb-4">
              <h6 class="filter-section-title font-monospace" data-translate="brand">Brands</h6>
              <div id="brands-filter-list">
                <!-- Injected dynamically -->
              </div>
            </div>

            <!-- Price Range Filter -->
            <div class="mb-4">
              <h6 class="filter-section-title font-monospace" data-translate="price-range">Price Range</h6>
              <label for="price-range" class="form-label text-muted fs-8 font-monospace d-flex justify-content-between mb-2">
                <span data-translate="price-range">نطاق السعر</span>
                <span class="text-white fw-bold" id="price-val"></span>
              </label>
              <input type="range" class="form-range" id="price-range" min="30" max="5000" step="50" value="5000">
              <div class="d-flex justify-content-between fs-9 font-monospace text-muted mt-1">
                <span id="min-price-label"></span>
                <span id="max-price-label"></span>
              </div>
            </div>

            <!-- Stock Status Filter -->
            <div>
              <h6 class="filter-section-title font-monospace" data-translate="availability">Availability</h6>
              <label class="custom-checkbox-orange">
                <span data-translate="stock-only">المتوفر في المخزن فقط</span>
                <input type="checkbox" id="stock-only-filter">
                <span class="checkbox-checkmark"></span>
              </label>
            </div>
          </div>
        </div>

        <!-- Catalog Grid Area -->
        <div class="col-lg-9 col-md-8">
          
          <!-- Catalog Toolbar -->
          <div class="glass-panel p-3 mb-4 d-flex flex-wrap align-items-center justify-content-between gap-3">
            <div class="text-muted font-monospace fs-7">
              <span data-translate="showing-text">عرض</span> <span class="text-white fw-bold" id="showing-count">0</span> <span data-translate="products-text">من القطع</span>
            </div>
            <div class="d-flex align-items-center gap-3">
              <label for="sorting-select" class="text-muted font-monospace fs-8 text-nowrap mb-0" data-translate="sorting">الترتيب حسب:</label>
              <select id="sorting-select" class="form-select bg-glass border-orange text-white font-monospace fs-7 py-1 px-3" style="width: auto; box-shadow: none;">
                <option value="popularity" data-translate="sort-popularity">الأكثر مبيعاً</option>
                <option value="rating" data-translate="sort-rating">الأعلى تقييماً</option>
                <option value="price-low" data-translate="sort-price-low">السعر: من الأقل للأعلى</option>
                <option value="price-high" data-translate="sort-price-high">السعر: من الأعلى للأقل</option>
              </select>
            </div>
          </div>

          <!-- Product Grid -->
          <div class="row g-4" id="products-catalog-grid">
            <!-- Injected dynamically via JS -->
          </div>

          <!-- Empty Catalog Alert -->
          <div id="empty-catalog-alert" class="glass-panel p-5 text-center my-4" style="display: none;">
            <i class="bi bi-cpu-fill text-orange display-1 d-block mb-3 animate-pulse"></i>
            <h4 class="text-white font-monospace" data-translate="empty-search-alert">لا توجد قطع مطابقة للبحث</h4>
            <p class="text-muted font-monospace fs-7 mt-2" data-translate="empty-search-desc">اضبط خيارات التصفية أو نطاق السعر وحاول مجدداً.</p>
            <button class="btn btn-gradient font-monospace mt-3" id="reset-alert-filters-btn" data-translate="clear-filters">Reset All Filters</button>
          </div>

          <!-- Pagination -->
          <div class="d-flex justify-content-center mt-5">
            <nav aria-label="Catalog Pagination">
              <ul class="pagination pagination-premium font-monospace fs-7 mb-0" id="catalog-pagination">
                <!-- Injected dynamically -->
              </ul>
            </nav>
          </div>

        </div>

      </div>
    </div>
  </section>

  <!-- Quick View Bootstrap Modal -->
  <div class="modal fade" id="quickViewModal" tabindex="-1" aria-labelledby="quickViewModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content modal-content-premium border-orange glow-orange">
        <div class="modal-header modal-header-premium d-flex justify-content-between align-items-center">
          <h5 class="modal-title font-monospace text-orange text-uppercase" id="quickViewModalLabel"><i class="bi bi-zoom-in me-2 ms-2"></i>نظرة سريعة على المنتج</h5>
          <button type="button" class="nav-icon-btn fs-4" data-bs-dismiss="modal" aria-label="Close"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="modal-body p-4" id="quick-view-body">
          <!-- Injected via JavaScript dynamically -->
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <script>renderPremiumFooter();</script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <!-- Products Catalog Script -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Configuration parameters
      const itemsPerPage = 8;
      let currentPage = 1;
      let filteredProducts = [...PRODUCTS_DATA];
      
      // Filter lists state
      const selectedCategories = new Set();
      const selectedBrands = new Set();
      
      // Get URL params for pre-filtering
      const urlParams = new URLSearchParams(window.location.search);
      const preselectCategory = urlParams.get('category');

      let currentLang = getCurrentLang();
      const categories_names = {};

      function renderFilters() {
        currentLang = getCurrentLang();
        // Recomputed fresh each call so post-sync product updates are reflected
        const categories = [...new Set(PRODUCTS_DATA.map(p => p.category))];
        const brands = [...new Set(PRODUCTS_DATA.map(p => p.brand))];
        PRODUCTS_DATA.forEach(p => {
          categories_names[p.category] = currentLang === 'ar' ? p.category_ar : p.category_en;
        });

        const categoriesContainer = document.getElementById('categories-filter-list');
        const brandsContainer = document.getElementById('brands-filter-list');

        if (categoriesContainer) {
          categoriesContainer.innerHTML = categories.map(cat => {
            const displayName = categories_names[cat] || cat;
            const checked = cat === preselectCategory ? 'checked' : '';
            if (cat === preselectCategory) selectedCategories.add(cat);
            return `
              <label class="custom-checkbox-orange">
                ${displayName}
                <input type="checkbox" class="category-checkbox" value="${cat}" ${checked}>
                <span class="checkbox-checkmark"></span>
              </label>
            `;
          }).join('');
        }

        if (brandsContainer) {
          brandsContainer.innerHTML = brands.map(brand => `
            <label class="custom-checkbox-orange">
              ${brand}
              <input type="checkbox" class="brand-checkbox" value="${brand}">
              <span class="checkbox-checkmark"></span>
            </label>
          `).join('');
        }
      }

      renderFilters();

      // Listen to language changes
      window.addEventListener('languageChanged', () => {
        renderFilters();
        filterAndSortProducts();
      });

      // Re-render once Supabase data finishes syncing (initial load can
      // otherwise render from a stale/empty local cache before the pull completes)
      window.addEventListener('gpu:synced', () => {
        renderFilters();
        filterAndSortProducts();
      });

      // UI Element Bindings
      const grid = document.getElementById('products-catalog-grid');
      const countLabel = document.getElementById('showing-count');
      const priceRange = document.getElementById('price-range');
      const priceVal = document.getElementById('price-val');
      const stockOnlyFilter = document.getElementById('stock-only-filter');
      const sortingSelect = document.getElementById('sorting-select');
      const pagination = document.getElementById('catalog-pagination');
      const emptyAlert = document.getElementById('empty-catalog-alert');
      const clearFiltersBtn = document.getElementById('clear-filters-btn');
      const resetAlertFiltersBtn = document.getElementById('reset-alert-filters-btn');

      // Helper function to render stars
      function getStarsHTML(rating) {
        let stars = '';
        const fullStars = Math.floor(rating);
        const halfStar = rating % 1 >= 0.5;
        for (let i = 1; i <= 5; i++) {
          if (i <= fullStars) {
            stars += '<i class="bi bi-star-fill text-warning"></i>';
          } else if (i === fullStars + 1 && halfStar) {
            stars += '<i class="bi bi-star-half text-warning"></i>';
          } else {
            stars += '<i class="bi bi-star text-muted"></i>';
          }
        }
        return stars;
      }

      // Core Multi-Filter and Sorting logic
      function filterAndSortProducts() {
        const maxPrice = parseFloat(priceRange.value);
        const stockOnly = stockOnlyFilter.checked;
        
        filteredProducts = PRODUCTS_DATA.filter(product => {
          // Category filter
          if (selectedCategories.size > 0 && !selectedCategories.has(product.category)) return false;
          // Brand filter
          if (selectedBrands.size > 0 && !selectedBrands.has(product.brand)) return false;
          // Price filter
          if (product.price > maxPrice) return false;
          // Stock filter
          if (stockOnly && product.availability_en === "Out of Stock") return false;
          
          return true;
        });

        // Sorting
        const sortingMode = sortingSelect.value;
        if (sortingMode === 'price-low') {
          filteredProducts.sort((a, b) => a.price - b.price);
        } else if (sortingMode === 'price-high') {
          filteredProducts.sort((a, b) => b.price - a.price);
        } else if (sortingMode === 'rating') {
          filteredProducts.sort((a, b) => b.rating - a.rating);
        } else {
          // popularity / default
          filteredProducts.sort((a, b) => b.reviewsCount - a.reviewsCount);
        }

        currentPage = 1; // Reset to page 1 on filter
        renderCatalogGrid();
      }

      // Catalog Render
      function renderCatalogGrid() {
        const totalItems = filteredProducts.length;
        countLabel.textContent = totalItems;

        if (totalItems === 0) {
          const isCatalogEmpty = PRODUCTS_DATA.length === 0;
          const emptyTitle = isCatalogEmpty
            ? (currentLang === 'ar' ? 'لا توجد منتجات في الكتالوج بعد' : 'No products in the catalog yet')
            : (currentLang === 'ar' ? 'لا توجد منتجات مطابقة' : 'No matching products');
          const emptyDesc = isCatalogEmpty
            ? (currentLang === 'ar' ? 'سيظهر الكتالوج هنا بعد إضافة المنتجات من لوحة الإدارة أو ربط الباك إند.' : 'Products will appear here after they are added from the admin panel or backend.')
            : (currentLang === 'ar' ? 'اضبط خيارات التصفية أو نطاق السعر وحاول مرة أخرى.' : 'Adjust the filters or price range and try again.');
          const resetButton = document.getElementById('reset-alert-filters-btn');
          const emptyTitleEl = emptyAlert.querySelector('h4');
          const emptyDescEl = emptyAlert.querySelector('p');
          if (emptyTitleEl) emptyTitleEl.textContent = emptyTitle;
          if (emptyDescEl) emptyDescEl.textContent = emptyDesc;
          if (resetButton) resetButton.style.display = isCatalogEmpty ? 'none' : '';
          grid.innerHTML = '';
          emptyAlert.style.display = 'block';
          pagination.innerHTML = '';
          return;
        }

        emptyAlert.style.display = 'none';
        const resetButton = document.getElementById('reset-alert-filters-btn');
        if (resetButton) resetButton.style.display = '';

        // Slice for pagination
        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = Math.min(startIndex + itemsPerPage, totalItems);
        const paginatedProducts = filteredProducts.slice(startIndex, endIndex);

        grid.innerHTML = paginatedProducts.map(product => {
          const isWishlisted = wishlist.includes(product.id) ? 'active' : '';
          const discountText = currentLang === 'ar' ? 'خصم' : 'OFF';
          const discountBadge = product.discount ? `<div class="product-card-badge">${product.discount}% ${discountText}</div>` : '';
          const badge = currentLang === 'ar' ? product.badge_ar : product.badge_en;
          const badgeNew = (badge === 'New' || badge === 'جديد') ? `<div class="product-card-badge badge-new">${currentLang === 'ar' ? 'جديد' : 'NEW'}</div>` : '';
          const cardBadge = discountBadge || (badge ? `<div class="product-card-badge">${badge}</div>` : '') || '';
          const oldPriceHTML = product.oldPrice ? `<span class="product-old-price" dir="ltr">${formatPrice(product.oldPrice)}</span>` : '';
          const name = currentLang === 'ar' ? product.name_ar : product.name_en;
          const category = currentLang === 'ar' ? product.category_ar : product.category_en;
          const addText = currentLang === 'ar' ? 'إضافة' : 'Add';

          return `
            <div class="col-xl-3 col-lg-4 col-sm-6 col-12">
              <div class="product-card h-100">
                ${cardBadge}
                <button class="product-card-wishlist wishlist-btn-${product.id} ${isWishlisted}" onclick="toggleWishlist('${product.id}')">
                  <i class="bi bi-heart"></i>
                </button>
                <a href="product-details.html?id=${product.id}" class="text-decoration-none">
                  <div class="product-card-img-wrapper">
                    ${product.image}
                  </div>
                </a>
                <div class="product-card-body">
                  <div class="product-category">${category}</div>
                  <a href="product-details.html?id=${product.id}" class="text-decoration-none">
                    <h5 class="product-title text-white" title="${name}">${name}</h5>
                  </a>
                  <div class="product-rating">
                    ${getStarsHTML(product.rating)} <span class="text-muted font-monospace">(${product.rating})</span>
                  </div>
                  <div class="d-flex align-items-center justify-content-between">
                    <div class="product-price-wrapper">
                      <span class="product-price" dir="ltr">${formatPrice(product.price)}</span>
                      ${oldPriceHTML}
                    </div>
                    <button class="btn btn-gradient btn-sm font-monospace fs-7 py-1 px-2" onclick="addToCart('${product.id}', 1)">
                      <i class="bi bi-cart-plus me-1 ms-1"></i> ${addText}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          `;
        }).join('');

        renderPaginationControls(totalItems);
      }

      // Pagination UI Render
      function renderPaginationControls(totalItems) {
        const totalPages = Math.ceil(totalItems / itemsPerPage);
        if (totalPages <= 1) {
          pagination.innerHTML = '';
          return;
        }

        let controls = '';
        
        // Previous Button
        controls += `
          <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
            <a class="page-link bg-glass border-orange text-white" href="#" onclick="changePage(${currentPage - 1}); return false;"><i class="bi bi-chevron-left"></i></a>
          </li>
        `;

        for (let i = 1; i <= totalPages; i++) {
          controls += `
            <li class="page-item ${currentPage === i ? 'active' : ''}">
              <a class="page-link bg-glass border-orange text-white ${currentPage === i ? 'btn-gradient border-0' : ''}" href="#" onclick="changePage(${i}); return false;">${i}</a>
            </li>
          `;
        }

        // Next Button
        controls += `
          <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
            <a class="page-link bg-glass border-orange text-white" href="#" onclick="changePage(${currentPage + 1}); return false;"><i class="bi bi-chevron-right"></i></a>
          </li>
        `;

        pagination.innerHTML = controls;
      }

      // Change Page Handler
      window.changePage = function(pageNumber) {
        currentPage = pageNumber;
        renderCatalogGrid();
        window.scrollTo({
          top: 300,
          behavior: 'smooth'
        });
      };

      // Trigger Quick View Modal
      window.triggerQuickView = function(productId) {
        const product = PRODUCTS_DATA.find(p => p.id === productId);
        if (!product) return;

        const body = document.getElementById('quick-view-body');
        const oldPriceHTML = product.oldPrice ? `<span class="text-decoration-line-through text-muted fs-6" dir="ltr">${formatPrice(product.oldPrice)}</span>` : '';
        
        const specs = currentLang === 'ar' ? product.specs_ar : product.specs_en;
        const specsRows = Object.entries(specs).map(([key, val]) => `
          <tr>
            <td class="text-orange font-monospace fw-bold fs-7 py-2" style="width: 35%; border-color: rgba(255,255,255,0.05);">${key}</td>
            <td class="text-white font-monospace fs-7 py-2" style="border-color: rgba(255,255,255,0.05);">${val}</td>
          </tr>
        `).join('');

        const name = currentLang === 'ar' ? product.name_ar : product.name_en;
        const category = currentLang === 'ar' ? product.category_ar : product.category_en;
        const desc = currentLang === 'ar' ? product.description_ar : product.description_en;
        const avail = currentLang === 'ar' 
          ? (product.stock > 0 ? `متوفر في المخزن (متبقي ${product.stock} قطع)` : 'نفذت الكمية')
          : (product.stock > 0 ? `In Stock (${product.stock} left)` : 'Out of Stock');
        const addText = currentLang === 'ar' ? 'إضافة للسلة' : 'Add To Cart';
        const specsTitle = currentLang === 'ar' ? 'المواصفات الفنية' : 'SPECIFICATIONS';

        body.innerHTML = `
          <div class="row g-4">
            <div class="col-md-5 d-flex align-items-center justify-content-center bg-glass border-orange rounded p-4" style="height: 300px;">
              ${product.image}
            </div>
            <div class="col-md-7 d-flex flex-column justify-content-between">
              <div>
                <span class="text-orange font-monospace text-uppercase fw-bold fs-8">${category}</span>
                <h4 class="text-white mt-1 mb-2 font-monospace">${name}</h4>
                <div class="product-rating mb-3">
                  ${getStarsHTML(product.rating)} <span class="text-muted font-monospace">(${product.rating})</span>
                </div>
                <p class="text-secondary fs-7 mb-4">${desc}</p>
                <div class="d-flex align-items-center gap-3 mb-4">
                  <span class="text-white fs-3 font-monospace fw-bold" dir="ltr">${formatPrice(product.price)}</span>
                  ${oldPriceHTML}
                  <span class="badge bg-glass border-orange text-orange font-monospace fs-8">${avail}</span>
                </div>
              </div>
              <div class="d-flex gap-3">
                <button class="btn btn-gradient flex-grow-1 py-3 font-monospace fs-7" onclick="addToCart('${product.id}', 1); bootstrap.Modal.getInstance(document.getElementById('quickViewModal')).hide();">
                  <i class="bi bi-cart-plus me-2 ms-2"></i>${addText}
                </button>
                <button class="btn btn-outline-orange px-4 py-3" onclick="toggleWishlist('${product.id}')">
                  <i class="bi bi-heart"></i>
                </button>
                <a href="product-details.html?id=${product.id}" class="btn btn-outline-orange px-3 py-3" title="View Full Specs">
                  <i class="bi bi-info-circle"></i>
                </a>
              </div>
            </div>
            <div class="col-12 mt-4">
              <h6 class="text-white font-monospace border-bottom border-orange pb-2 mb-3"><i class="bi bi-list-task me-2 ms-2 text-orange"></i>${specsTitle}</h6>
              <table class="table table-borderless text-start align-middle mb-0">
                <tbody>
                  ${specsRows}
                </tbody>
              </table>
            </div>
          </div>
        `;

        const modal = new bootstrap.Modal(document.getElementById('quickViewModal'));
        modal.show();
      };

      // Filter Change Event Listeners
      document.addEventListener('change', (e) => {
        if (e.target.classList.contains('category-checkbox')) {
          const val = e.target.value;
          if (e.target.checked) selectedCategories.add(val);
          else selectedCategories.delete(val);
          filterAndSortProducts();
        }

        if (e.target.classList.contains('brand-checkbox')) {
          const val = e.target.value;
          if (e.target.checked) selectedBrands.add(val);
          else selectedBrands.delete(val);
          filterAndSortProducts();
        }
      });

      priceRange.addEventListener('input', (e) => {
        priceVal.innerHTML = formatPrice(parseInt(e.target.value));
        filterAndSortProducts();
      });

      stockOnlyFilter.addEventListener('change', filterAndSortProducts);
      sortingSelect.addEventListener('change', filterAndSortProducts);

      // Clear Filters Handler
      const clearAllFilters = () => {
        selectedCategories.clear();
        selectedBrands.clear();
        document.querySelectorAll('.category-checkbox, .brand-checkbox').forEach(cb => cb.checked = false);
        priceRange.value = 5000;
        priceVal.innerHTML = formatPrice(5000);
        stockOnlyFilter.checked = false;
        sortingSelect.value = 'popularity';
        filterAndSortProducts();
      };

      if (clearFiltersBtn) clearFiltersBtn.addEventListener('click', clearAllFilters);
      if (resetAlertFiltersBtn) resetAlertFiltersBtn.addEventListener('click', clearAllFilters);

      // Initialize Price Filter Labels
      const minPriceLabel = document.getElementById('min-price-label');
      const maxPriceLabel = document.getElementById('max-price-label');
      if (minPriceLabel) minPriceLabel.innerHTML = formatPrice(30);
      if (maxPriceLabel) maxPriceLabel.innerHTML = formatPrice(5000);
      if (priceVal) priceVal.innerHTML = formatPrice(5000);

      // Execute Initial Filter & Render
      filterAndSortProducts();
    });
  </script>
</body>
</html>
